version: '3.8'

services:
  memgraph:
    image: memgraph/memgraph-mage:latest
    container_name: knowledge-database
    ports:
      - "7687:7687" # Bolt protocol (client connections)
    volumes:
      - memgraph_data:/var/lib/memgraph
    environment:
      - MEMGRAPH_LOG_LEVEL=DEBUG
    restart: on-failure

  memgraph-lab:
    image: memgraph/lab:latest
    container_name: knowledge-lab
    ports:
      - "3000:3000" # Lab web UI
    environment:
      - QUICK_CONNECT_MG_HOST=memgraph
      - QUICK_CONNECT_MG_PORT=7687
    depends_on:
      - memgraph
    restart: on-failure

volumes:
  memgraph_data:
