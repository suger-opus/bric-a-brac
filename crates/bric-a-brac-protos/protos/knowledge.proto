syntax = "proto3";

package knowledge;

import "common.proto";

service Knowledge {
    rpc LoadGraph(LoadGraphRequest) returns (common.GraphDataProto);
    rpc InitializeSchema(InitializeSchemaRequest) returns (common.Empty);
    rpc CreateNode(CreateNodeRequest) returns (common.NodeDataProto);
    rpc UpdateNode(UpdateNodeRequest) returns (common.NodeDataProto);
    rpc DeleteNode(DeleteNodeRequest) returns (common.Empty);
    rpc CreateEdge(CreateEdgeRequest) returns (common.EdgeDataProto);
    rpc UpdateEdge(UpdateEdgeRequest) returns (common.EdgeDataProto);
    rpc DeleteEdge(DeleteEdgeRequest) returns (common.Empty);
    rpc SearchNodes(SearchNodesRequest) returns (SearchNodesResponse);
    rpc GetNode(GetNodeRequest) returns (common.NodeDataProto);
    rpc GetNeighbors(GetNeighborsRequest) returns (common.GraphDataProto);
    rpc FindPaths(FindPathsRequest) returns (FindPathsResponse);
    rpc DeleteGraph(DeleteGraphRequest) returns (common.Empty);
}

message LoadGraphRequest {
  string graph_id = 1;
}

message InitializeSchemaRequest {
    string graph_id = 1;
    repeated string node_keys = 2;
}
message CreateNodeRequest {
    string graph_id = 1;
    common.CreateNodeDataProto node = 2;
}

message UpdateNodeRequest {
    string graph_id = 1;
    common.UpdateNodeDataProto node = 2;
}

message DeleteNodeRequest {
    string graph_id = 1;
    string node_data_id = 2;
}
message CreateEdgeRequest {
    string graph_id = 1;
    common.CreateEdgeDataProto edge = 2;
}

message UpdateEdgeRequest {
    string graph_id = 1;
    common.UpdateEdgeDataProto edge = 2;
}

message DeleteEdgeRequest {
    string graph_id = 1;
    string edge_data_id = 2;
}

message SearchNodesRequest {
    string graph_id = 1;
    optional string node_key = 2;
    repeated float query_embedding = 3;
    int32 limit = 4;
}

message SearchNodesResponse {
    repeated common.NodeSearchProto nodes = 1;
}

message GetNodeRequest {
    string graph_id = 1;
    string node_data_id = 2;
}

message GetNeighborsRequest {
    string graph_id = 1;
    string node_data_id = 2;
    optional string edge_key = 3;
    int32 depth = 4;
}

message FindPathsRequest {
    string graph_id = 1;
    string from_node_data_id = 2;
    string to_node_data_id = 3;
    int32 max_depth = 4;
}
message FindPathsResponse {
    repeated common.GraphDataProto paths = 1;
}

message DeleteGraphRequest {
    string graph_id = 1;
    repeated string node_keys = 2;
}
