syntax = "proto3";

package knowledge;

service KnowledgeService {
  rpc InsertNode(InsertNodeRequest) returns (InsertNodeResponse);
  rpc InsertEdge(InsertEdgeRequest) returns (InsertEdgeResponse);
  rpc LoadGraph(LoadGraphRequest) returns (LoadGraphResponse);
}

message InsertNodeRequest {
  string graph_id = 1;
  string label = 2;
  map<string, PropertyValue> properties = 3;
}

message InsertNodeResponse {
  string node_id = 1;
}

message InsertEdgeRequest {
  string from_id = 1;
  string to_id = 2;
  string label = 3;
  map<string, PropertyValue> properties = 4;
}

message InsertEdgeResponse {
  string edge_id = 1;
}

message LoadGraphRequest {
  string graph_id = 1;
}

message LoadGraphResponse {
  repeated Node nodes = 1;
  repeated Edge edges = 2;
}

message PropertyValue {
  oneof value {
    string string_value = 1;
    double number_value = 2;
    bool bool_value = 3;
  }
}

message Node {
  string id = 1;
  string label = 2;
  map<string, PropertyValue> properties = 3;
}

message Edge {
  string id = 1;
  string label = 2;
  string from_id = 3;
  string to_id = 4;
  map<string, PropertyValue> properties = 5;
}

