syntax = "proto3";

package knowledge;

import "common.proto";

service Knowledge {
    rpc LoadGraph(LoadGraphRequest) returns (common.GraphDataProto);
    rpc InsertGraph(InsertGraphRequest) returns (common.GraphDataProto);
}

message LoadGraphRequest {
  string graph_id = 1;
}

message InsertGraphRequest {
    string graph_id = 1;
    common.CreateGraphDataProto graph_data = 2;
}
