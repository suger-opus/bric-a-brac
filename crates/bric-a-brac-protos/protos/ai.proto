syntax = "proto3";

package ai;

// AI service for schema generation
service Ai {
  // Generate a graph schema from file content
  rpc GenerateSchema(GenerateSchemaRequest) returns (GenerateSchemaResponse);
}

// File type enumeration
enum FileType {
  FILE_TYPE_TXT = 0;
  FILE_TYPE_CSV = 1;
}

// Request to generate a schema
message GenerateSchemaRequest {
  // Raw file content as bytes
  bytes file_content = 1;
  
  // Type of the file
  FileType file_type = 2;
}

// Response containing the generated schema
message GenerateSchemaResponse {
  // Generated schema as JSON string
  string schema_json = 1;
}
