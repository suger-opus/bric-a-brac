syntax = "proto3";

package ai;

import "common.proto";

service Ai {
    rpc GenerateSchema(GenerateSchemaRequest) returns (common.CreateGraphSchemaProto);
    rpc GenerateData(GenerateDataRequest) returns (common.CreateGraphDataProto);
}

message GenerateSchemaRequest {
    bytes file_content = 1;
    FileTypeProto file_type = 2;
}

message GenerateDataRequest {
    bytes file_content = 1;
    FileTypeProto file_type = 2;
    common.GraphSchemaProto schema = 3;
}

enum FileTypeProto {
    TXT = 0;
    CSV = 1;
}
