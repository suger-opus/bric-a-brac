[package]
name = "metadata"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.41.1", features = ["macros", "rt-multi-thread"] }
tonic = "0.13"
prost = "0.13"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4"] }
clap = { version = "4.5", features = ["derive", "env"] }
bric-a-brac-protos = { path = "../crates/bric-a-brac-protos" }
