[env]
# Metadata Database Configuration
# METADATA_DB_HOST=""
# METADATA_DB_PORT=""
# METADATA_DB_USER=""
# METADATA_DB_PASSWORD=""
# METADATA_DB_NAME=""
# METADATA_DB_URL="postgresql://{{env.METADATA_DB_USER}}:{{env.METADATA_DB_PASSWORD}}@{{env.METADATA_DB_HOST}}:{{env.METADATA_DB_PORT}}/{{env.METADATA_DB_NAME}}"
