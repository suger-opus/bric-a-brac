# Metadata Server Configuration
# METADATA_SERVER_HOST=""
# METADATA_SERVER_PORT=""

# Knowledge Service Configuration
# KNOWLEDGE_SERVER_HOST=""
# KNOWLEDGE_SERVER_PORT=""
# KNOWLEDGE_SERVER_URL="http://{{env.KNOWLEDGE_SERVER_HOST}}:{{env.KNOWLEDGE_SERVER_PORT}}"

# SQLX
# SQLX_OFFLINE="false"

# LOGS
