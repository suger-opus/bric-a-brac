[tasks.up]
description = "Start services. Usage: mise run up -- <profiles...> (knowledge, metadata, ai, knowledge-db, metadata-db, all)"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ $# -eq 0 ]; then
  echo "Usage: mise run up -- <profiles...>"
  echo "Available profiles: knowledge, metadata, ai, knowledge-db, metadata-db, all"
  exit 1
fi

PROFILE_FLAGS=""
for arg in "$@"; do
  if [ "$arg" = "all" ]; then
    PROFILE_FLAGS="--profile knowledge --profile metadata --profile ai"
    break
  fi
  PROFILE_FLAGS="$PROFILE_FLAGS --profile $arg"
done

echo "Starting services with profiles: $@"
docker compose $PROFILE_FLAGS up --build -d
"""

[tasks.down]
description = "Stop services. Usage: mise run down -- <profiles...> (knowledge, metadata, ai, knowledge-db, metadata-db, all)"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ $# -eq 0 ]; then
  echo "Usage: mise run down -- <profiles...>"
  echo "Available profiles: knowledge, metadata, ai, knowledge-db, metadata-db, all"
  exit 1
fi

PROFILE_FLAGS=""
for arg in "$@"; do
  if [ "$arg" = "all" ]; then
    PROFILE_FLAGS="--profile knowledge --profile metadata --profile ai"
    break
  fi
  PROFILE_FLAGS="$PROFILE_FLAGS --profile $arg"
done

echo "Stopping services with profiles: $@"
docker compose $PROFILE_FLAGS down
"""

[tasks.status]
description = "Show running containers"
run = "docker compose ps"

[tasks.config]
description = "Show resolved compose config. Usage: mise run config -- <profiles...>"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ $# -eq 0 ]; then
  echo "Usage: mise run config -- <profiles...>"
  echo "Available profiles: knowledge, metadata, ai, knowledge-db, metadata-db, all"
  exit 1
fi

PROFILE_FLAGS=""
for arg in "$@"; do
  if [ "$arg" = "all" ]; then
    PROFILE_FLAGS="--profile knowledge --profile metadata --profile ai"
    break
  fi
  PROFILE_FLAGS="$PROFILE_FLAGS --profile $arg"
done

docker compose $PROFILE_FLAGS config
"""

[tasks."dev:knowledge"]
description = "Start everything EXCEPT knowledge server (for local cargo run in knowledge/)"
run = "docker compose --profile knowledge-db --profile metadata --profile ai up --build -d"

[tasks."dev:metadata"]
description = "Start everything EXCEPT metadata server (for local cargo run in metadata/)"
run = "docker compose --profile knowledge --profile metadata-db --profile ai up --build -d"

[tasks."dev:ai"]
description = "Start everything EXCEPT AI server (for local cargo run in ai/)"
run = "docker compose --profile knowledge --profile metadata up --build -d"
